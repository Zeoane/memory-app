<dialog class="modal modal--gt-winner-orange" open aria-labelledby="gt-winner-orange-title" aria-modal="true">
  <div class="modal--gt-winner-orange__wrap">
    <h2 id="gt-winner-orange-title" class="visually-hidden">Orange gewinnt</h2>
    <div class="modal--gt-winner-orange__scene">
      <div class="modal--gt-winner-orange__column">
        <div class="modal--gt-winner-orange__headline">
          <img
            class="modal--gt-winner-orange__headline-img"
            src="{{WINNER_SVG}}"
            alt=""
            width="468"
            height="118"
            decoding="async"
          />
        </div>
        <div class="modal--gt-winner-orange__trophy-row">
          <img
            class="modal--gt-winner-orange__trophy-img"
            src="{{TROPHY_SVG}}"
            alt=""
            width="288"
            height="344"
            decoding="async"
          />
        </div>
        <button type="button" class="modal--gt-winner-orange__home-btn" data-action="go-home">Home</button>
      </div>
    </div>
  </div>
</dialog>
