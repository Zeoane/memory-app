<figure class="controller-icon">
  <svg
    class="controller-icon__svg"
    viewBox="0 0 120 80"
    xmlns="http://www.w3.org/2000/svg"
    role="img"
    aria-labelledby="controller-figure-title"
  >
    <title id="controller-figure-title">Stilisiertes Gamepad</title>
    <rect class="controller-icon__body" x="8" y="18" width="104" height="48" rx="14" />
    <circle class="controller-icon__pad" cx="38" cy="42" r="6" />
    <circle class="controller-icon__btn controller-icon__btn--a" cx="88" cy="36" r="5" />
    <circle class="controller-icon__btn controller-icon__btn--b" cx="98" cy="46" r="5" />
    <rect class="controller-icon__trigger" x="52" y="22" width="16" height="5" rx="2" />
  </svg>
  <figcaption class="controller-icon__caption">Stilisiertes Gamepad als Symbol für das Spiel</figcaption>
</figure>
