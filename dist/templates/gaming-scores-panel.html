<div class="game-bar__scores-panel game-bar__scores-panel--gaming">
  <div class="game-bar__scores game-bar__scores--gaming" role="group" aria-label="Punktestände">
    <div class="game-bar__pair game-bar__pair--gaming">
      <img class="game-bar__pawn-icon" src="{{PAWN_ORANGE_SRC}}" alt="" width="22" height="28" decoding="async" />
      <span class="game-bar__score-num game-bar__score-num--gaming game-bar__score-num--orange">{{ORANGE_SCORE}}</span>
    </div>
    <div class="game-bar__pair game-bar__pair--gaming">
      <img class="game-bar__pawn-icon" src="{{PAWN_BLUE_SRC}}" alt="" width="22" height="28" decoding="async" />
      <span class="game-bar__score-num game-bar__score-num--gaming game-bar__score-num--blue">{{BLUE_SCORE}}</span>
    </div>
  </div>
</div>
