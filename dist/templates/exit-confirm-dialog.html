<dialog class="modal modal--exit-confirm" open aria-labelledby="exit-confirm-title" aria-modal="true">
  <div class="modal--exit-confirm__panel">
    <h2 id="exit-confirm-title" class="modal--exit-confirm__title">
      Are you sure you want to quit<br />
      the game?
    </h2>
    <div class="modal--exit-confirm__actions" role="group" aria-label="Bestätigung">
      <button type="button" class="btn btn--exit-back-to-game" data-action="dismiss-exit-confirm">Back to game</button>
      <button type="button" class="btn btn--exit-confirm-quit" data-action="confirm-exit-game">Exit game</button>
    </div>
  </div>
</dialog>
